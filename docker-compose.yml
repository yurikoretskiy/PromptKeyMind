services:
  promptkeymind:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./vocab.html:/usr/share/nginx/html/vocab.html:ro
      - ./css:/usr/share/nginx/html/css:ro
      - ./js:/usr/share/nginx/html/js:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - n8n_default
    labels:
      - traefik.enable=true
      - traefik.http.routers.promptkeymind.rule=Host(`type.yurykoretskiy.space`)
      - traefik.http.routers.promptkeymind.tls=true
      - traefik.http.routers.promptkeymind.tls.certresolver=mytlschallenge
      - traefik.http.services.promptkeymind.loadbalancer.server.port=80

networks:
  n8n_default:
    external: true
